repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-yaml
        # mkdocs configs use custom YAML tags that check-yaml cannot parse
        exclude: ^(docs/mkdocs/mkdocs\.yml|src/infdb_package/mkdocs\.yml)
      - id: check-toml
      - id: detect-private-key
  - repo: local
    hooks:
      - id: check-utf8
        name: "Check UTF-8 encoding"
        entry: python tests/ci/encoding_check.py
        language: system
        files: \.py$
        args:
          - --exclude-dirs
          - ".cache"
          - ".venv"
