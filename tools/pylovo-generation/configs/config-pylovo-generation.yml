pylovo-generation:
    config-infdb: "config-infdb.yml" # only filename - change path in ".env" file "CONFIG_INFDB_PATH"
    logging:
        path: "pylovo-generation.log"
        level: "INFO" # ERROR, WARNING, INFO, DEBUG
    hosts:
        postgres:
            user: "None"
            password: "None"
            db: "None"
            host: "None"
            exposed_port: "None"
            epsg: "None"
    data:
        ags_list: "None" # Optional: Predefined AGS instead of interactive selection (e.g., "9185149,9185150")
        input_schema: basedata  # Schema where input data is stored (for INFDB_SOURCE_SCHEMA)
        output_schema: pylovo   # Schema where pylovo results will be stored (for TARGET_SCHEMA)
