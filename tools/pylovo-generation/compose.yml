services:
    pylovo-generation:
        profiles: [ "pylovo"]
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - ../../.env          # root env (DB creds, etc.)
            - env_pylovo_generation.env
        volumes:
            - ./configs:/app/configs                           # infdb tool configs (config-pylovo-generation.yml etc.)
            - ./configs/pylovo:/app/configs/pylovo             # pylovo config overrides (PYLOVO_CONFIG_DIR)
            - ./src/pylovo:/app/src/pylovo
            - ../../src/infdb_package:/app/mnt/infdb_package
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            infdb-basedata-buildings:
                condition: service_completed_successfully
            infdb-basedata-ways:
                condition: service_completed_successfully
