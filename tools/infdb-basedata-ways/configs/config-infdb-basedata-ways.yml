# Configuration file for infdb-basedata-ways
#
# This configuration file contains tool-specific settings and database connection parameters.
#
# Database Connection Parameters:
# - Parameters set to 'None' will be automatically replaced with values from the central
#   configuration file specified in 'config-infdb' (config-infdb.yml by default)
# - This approach allows you to run locally using centralized database settings
# - To connect to a remote infdb instance, replace 'None' values with your specific
#   connection parameters (user, password, db, host, exposed_port, epsg)
#
infdb-basedata-ways:
    config-infdb: "config-infdb.yml" # only filename - change path in ".env" file "CONFIG_INFDB_PATH"
    logging:
        path: "infdb-basedata-ways.log"
        level: "INFO" # ERROR, WARNING, INFO, DEBUG
    hosts:
        postgres:
            user: None
            password: None
            db: None
            host: None
            exposed_port: None
            epsg: 3035 # 3035 (Europe)
    data:
        input_schema: opendata
        output_schema: basedata #also needs to be changed in env_changelog.list if other than basedata
        use_address_information: true
        klasse_filter:
            - "Wirtschaftsweg"
            - "Hauptwirtschaftsweg"
            - "Gemeindestraße"
            #- "Rad- und Fußweg"
            #- "Gleis"
            #- "Fußweg"
            #- "Nicht öffentliche Straße"
            - "Landesstraße, Staatsstraße"
            #- "Eisenbahn"
            - "Bundesstraße"
            - "Bundesautobahn"
            #- "Radweg"
            #- "Furt"
            #- "Zurollbahn, Taxiway"
            #- "Startbahn, Landebahn"
            - "Kreisstraße"
            #- "(Kletter-)Steig im Gebirge"
            #- "Stadtbahn"
            #- "Güterverkehr"
            #- "Personenverkehr"
            #- "S-bahn"
            #- "Ski-, Schlepplift"
            #- ["Personenverkehr", "Güterverkehr"]

        

        klasse_objektart_filter:
            "Bundesstraße":
                - "Strassenachse"
                - "Fahrbahnachse"   
            "Bundesautobahn":
                - "Strassenachse"
                #- "Fahrbahnachse" 

        apply_length_filter: True
        min_length_meter: 10
        apply_loop_filter: True
        apply_isolated_filter: True