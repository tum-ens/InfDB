# .gitlab-ci.yml

# Global variables
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

# Default tags for all jobs
default:
  image: ghcr.io/astral-sh/uv:python3.12-trixie-slim

  tags:
    - infdb-feature
    - docker
    - python


# Cache configuration
cache:
  paths:
    - .cache/pip
    - .cache/uv
    - .venv/

# Stages
stages:
  - setup
#  - test
  - lint
  - docs

# Setup job
setup:
  stage: setup
  script:
    - uv sync --group=test
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

## Test job
