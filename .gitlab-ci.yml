pre-commit-hook:
  stage: lint
  dependencies:
    - setup
  script:
    - apt-get update && apt-get install -y git
    - source .venv/bin/activate
    - pre-commit run --all-files
  allow_failure: true

# Linting job
lint:
  stage: lint
  dependencies:
    - setup
  script:
    - source .venv/bin/activate
    - ruff check .
    - ruff format --check .
  allow_failure: true

# Type checking
type-check:
  stage: lint
  dependencies:
    - setup
  script:
    - source .venv/bin/activate
    - mypy src
    - mypy tests
    - mypy services/infdb-api/fastapi
    - mypy services/infdb-api/postgrest
    - mypy services/infdb-api/pygeoapi
    - mypy tools/infdb-basedata
    #- mypy tools/infdb-import
    #- mypy tools/infdb-metadata
    #- mypy tools/buildings-to-street
    # - mypy tools/kwp
    - mypy tools/ro-heat
    - mypy tools/linear-heat-density
    #- mypy tools/sunpot

  allow_failure: true

# Security check
# Bandit:
#  - Low level issues should not block but can  .
 # - Some options only exist in CLI, thus not stored in pyprojct.toml
# B608: SQL strings in Python is used a lot, ideally should be refactored: https://bandit.readthedocs.io/en/latest/plugins/b608_hardcoded_sql_expressions.html

security:
  stage: lint
  dependencies:
    - setup
  script:
    - source .venv/bin/activate
    - bandit -r **/*.py --severity-level medium --exclude build --skip "B608"
    - safety scan
  allow_failure: true


pages:
  stage: docs
  dependencies:
    - setup
  script:
    - source .venv/bin/activate
    - mkdocs build -f docs/mkdocs/mkdocs.yml --site-dir ../../public
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - ~/.cache/ 
  artifacts:
    paths:
      - public